<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ODE · 포트폴리오 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:#3a3a46 transparent}
        *::-webkit-scrollbar{width:7px;height:7px}*::-webkit-scrollbar-thumb{background:#3a3a46;border-radius:4px}
        :root{--Y:#3D8EF0;--pink:#ff6fae;--green:#34d399;--red:#f87171;--amber:#fbbf24;--bg:#1A1A22;--bg2:#22222c;--bg3:#2a2a36;--border:rgba(255,255,255,.12);--text:#F0EEE8;--text2:#B8B4AC;--text3:#7A7870;--display:'Bebas Neue',sans-serif;--cond:'Barlow Condensed',sans-serif;--mono:'DM Mono',monospace;--kr:'Noto Sans KR',sans-serif}
        body{font-family:var(--kr);background:var(--bg);color:var(--text);line-height:1.5;padding:0 0 60px}
        .topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:11px;padding:12px 18px;background:rgba(26,26,34,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);flex-wrap:wrap}
        .tb-title{font-family:var(--display);font-size:19px;letter-spacing:1.5px;color:var(--Y)}
        .tb-sub{font-family:var(--cond);font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px}
        .tb-spacer{flex:1}
        .tb-status{font-family:var(--mono);font-size:11px;color:var(--text3)}
        .tb-status.ok{color:var(--green)}.tb-status.err{color:var(--red)}.tb-status.load{color:var(--Y)}
        .dirty-dot{display:none;width:8px;height:8px;border-radius:50%;background:var(--amber)}
        .dirty .dirty-dot{display:inline-block}
        .btn{border:none;border-radius:9px;font-family:var(--cond);font-weight:700;font-size:14px;letter-spacing:.4px;padding:9px 16px;cursor:pointer;transition:all .15s}
        .btn-save{background:linear-gradient(135deg,var(--Y),#2c6fc4);color:#fff;box-shadow:0 4px 14px rgba(61,142,240,.3)}
        .btn-save:hover{transform:translateY(-1px)}
        .btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
        .btn-ghost:hover{color:var(--text);border-color:var(--Y)}
        .wrap{max-width:920px;margin:0 auto;padding:18px}
        .cats{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
        .cat{padding:8px 15px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:.4px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px}
        .cat:hover{border-color:var(--Y);color:var(--text)}
        .cat.on{background:rgba(61,142,240,.16);border-color:var(--Y);color:var(--Y)}
        .cat .cnt{font-family:var(--mono);font-size:10px;opacity:.7}
        .cat-add{padding:8px 13px;border-radius:9px;border:1px dashed var(--Y);background:rgba(61,142,240,.08);color:var(--Y);font-family:var(--cond);font-size:13px;font-weight:700;cursor:pointer}
        .cat-add:hover{background:rgba(61,142,240,.18)}
        .cat-meta{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 15px;margin-bottom:15px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
        .cat-meta input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-family:var(--kr);font-size:13px;outline:none}
        .cat-meta input:focus{border-color:var(--Y)}
        .cat-meta .lbl{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--text3);text-transform:uppercase}
        .btn-delcat{margin-left:auto;background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:8px;font-family:var(--cond);font-weight:700;font-size:12px;padding:7px 12px;cursor:pointer}
        .drop{border:2px dashed var(--border);border-radius:14px;padding:24px 18px;text-align:center;cursor:pointer;transition:all .18s;background:var(--bg2);margin-bottom:16px}
        .drop:hover{border-color:var(--Y);background:rgba(61,142,240,.05)}
        .drop.over{border-color:var(--Y);background:rgba(61,142,240,.14)}
        .drop-ico{font-size:28px;margin-bottom:6px}
        .drop-t{font-family:var(--cond);font-size:16px;font-weight:900;letter-spacing:.4px}
        .drop-s{font-size:11px;color:var(--text3);margin-top:4px}
        .pgrid{display:grid;grid-template-columns:repeat(3, 1fr);gap:12px}
        .pcard{position:relative;border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--bg2);cursor:grab}
        .pcard.dragging{opacity:.4}.pcard.dragover{outline:2px solid var(--Y);outline-offset:-2px}
        .pcard-imgwrap{position:relative;width:100%;aspect-ratio:3.27/4;background:#15151c}
        .pcard-imgwrap img{width:100%;height:100%;display:block;object-fit:cover}
        .pcard-videowrap{position:relative;width:100%;aspect-ratio:2.8/4;background:#15151c}
        .pcard-videowrap video{width:100%;height:100%;display:block}
        .pcard-num{position:absolute;top:5px;left:6px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,.55);border-radius:5px;padding:1px 6px}
        .pcard-del{position:absolute;top:5px;right:5px;width:24px;height:24px;border:none;border-radius:6px;font-size:12px;font-weight:800;cursor:pointer;color:#fff;background:rgba(248,113,113,.85);opacity:0;transition:opacity .15s}
        .pcard:hover .pcard-del{opacity:1}
        .pcard-mv{position:absolute;top:34px;right:5px;display:flex;flex-direction:column;gap:3px;opacity:0;transition:opacity .15s}
        .pcard:hover .pcard-mv{opacity:1}
        .pcard-mv button{width:24px;height:22px;border:none;border-radius:5px;font-size:11px;font-weight:800;cursor:pointer;color:#fff;background:rgba(61,142,240,.85)}
        .pcard-meta{padding:8px;display:flex;flex-direction:column;gap:5px}
        .pcard-meta input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:var(--kr);font-size:11.5px;outline:none}
        .pcard-meta input:focus{border-color:var(--Y)}
        .pcard-meta input.tag{color:var(--Y);font-family:var(--mono);font-size:10.5px}
        .missing .pcard-imgwrap{outline:2px solid var(--amber);outline-offset:-2px}
        .empty{text-align:center;padding:30px;color:var(--text3);font-size:13px;grid-column:1/-1}
        .hint{font-size:11.5px;color:var(--text3);margin:14px 2px 0;line-height:1.6}
        .hint b{color:var(--Y)}
        .prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:12px;display:none}
        .prog.show{display:block}
        .prog-fill{height:100%;background:linear-gradient(90deg,var(--Y),var(--pink));width:0%;transition:width .3s}
        .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:9000;background:#000;border:1px solid var(--border);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all .3s;font-family:var(--kr)}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.ok{border-color:var(--green)}.toast.err{border-color:var(--red)}
        .syncbtn{font-family:var(--cond);font-size:12px;font-weight:700;border:1px solid var(--amber);background:rgba(251,191,36,.1);color:var(--amber);border-radius:8px;padding:6px 11px;cursor:pointer;margin-left:8px}
    </style>
</head>
<body>
<div class="topbar">
    <div class="tb-title">PORTFOLIO</div><div class="tb-sub">폴더 관리</div>
    <span class="dirty-dot" id="dirtyDot" title="저장 안 된 변경"></span>
    <div class="tb-spacer"></div>
    <div class="tb-status" id="status"></div>
    <button class="btn btn-ghost" onclick="loadAll()">↻ 새로고침</button>
    <button class="btn btn-save" onclick="save()">💾 저장 (배포)</button>
</div>
<div class="wrap">
    <div class="cats" id="cats"></div>
    <div id="catMeta"></div>
    <div class="drop" id="drop" onclick="document.getElementById('fileInput').click()">
        <div class="drop-ico">📂</div>
        <div class="drop-t" id="dropT">이미지를 여기에 끌어다 놓으세요</div>
        <div class="drop-s">선택한 폴더에 추가됩니다 · 여러 장 가능</div>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    </div>
    <div class="prog" id="prog"><div class="prog-fill" id="progFill"></div></div>
    <div class="pgrid" id="grid"></div>
    <div class="hint">· 폴더(대주제) 선택 → 이미지 드래그앤드롭으로 추가 · 카드 드래그/↑↓로 순서변경 · × 삭제<br>· 제목·태그 입력 후 <b>💾 저장</b>하면 프로필 포트폴리오 사이트에 바로 반영돼요<br>· <b style="color:var(--amber)">노란 테두리</b> = 목록엔 있는데 실제 파일이 없는 항목</div>
</div>
<div class="toast" id="toast"></div>

<script>
    var GH = { user: 'hmyu-dev', repo: 'ODE', folder: 'portfolio', rigging: 'rigging' };
    var D = { categories: [], portfolio: [], rigging: [] };
    var folderFiles = {};
    var curCat = null, dirty = false;
    var addFileList = [];
    var delFileList = [];

    function ghCfg() { return { user: localStorage.getItem('gh_user') || GH.user, repo: localStorage.getItem('gh_repo') || GH.repo, token: localStorage.getItem('gh_token') || '' }; }
    function status(m, c) { var e = document.getElementById('status'); e.textContent = m; e.className = 'tb-status ' + (c || ''); }
    function toast(m, c) { var e = document.getElementById('toast'); e.textContent = m; e.className = 'toast show ' + (c || ''); clearTimeout(e._t); e._t = setTimeout(function () { e.className = 'toast'; }, 2600); }
    function setDirty(v) { dirty = v; document.body.classList.toggle('dirty', v); }
    function b64(s) { return btoa(unescape(encodeURIComponent(s))); }
    function esc(s) { return (s == null ? '' : String(s)).replace(/"/g, '&quot;'); }
    function escTag(cat, s) {
        if (cat === 'portfolio') return (s == null ? 'Live2D' : String(s)).replace(/"/g, '&quot;');
        if (cat === 'rigging')  return (s == null ? 'Rigging' : String(s)).replace(/"/g, '&quot;');
        return s || '';
    }
    function base(cat) { var c = ghCfg(); return 'https://raw.githubusercontent.com/' + c.user + '/' + c.repo + '/main/' + cat + '/'; }

    var DEFAULT_CATS = [
        { id: 'portfolio', name: '포트폴리오', sub: 'Live2D 일러스트', num: '01' },
        { id: 'rigging',   name: '리깅',       sub: '리깅 영상',       num: '02' },
    ];

    function loadAll() {
        status('불러오는 중...', 'load'); setDirty(false);
        fetch('data/file.json?t=' + Date.now()).then(function (r) { return r.ok ? r.json() : {}; }).then(function (j) {
            var cats = j.categories;
            if (!cats || !cats.length) {
                cats = []; var keys = Object.keys(j).filter(function (k) { return k !== 'categories' && Array.isArray(j[k]); });
                if (!keys.length) keys = DEFAULT_CATS.map(function (c) { return c.id; });
                keys.forEach(function (k) { var d = DEFAULT_CATS.find(function (c) { return c.id === k; }); cats.push(d || { id: k, name: k.toUpperCase(), sub: '', num: '' }); });
            }
            D = { categories: cats, portfolio: j.portfolio, rigging: j.rigging };
            cats.forEach(function (c) { D[c.id] = Array.isArray(j[c.id]) ? j[c.id] : []; });
            if (!curCat || !cats.find(function (c) { return c.id === curCat; })) curCat = cats[0] ? cats[0].id : null;
            renderCats(); renderCatMeta();
            return Promise.all(cats.map(function (c) { return scanFolder(c.id); }));
        }).then(function () { renderItems(); status('불러옴 ✓', 'ok'); })
            .catch(function () { status('불러오기 실패', 'err'); renderCats(); renderItems(); });
    }

    function scanFolder(catId) {
        var c = ghCfg();
        return fetch('https://api.github.com/repos/' + c.user + '/' + c.repo + '/contents/' + catId)
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (data) { folderFiles[catId] = (Array.isArray(data) ? data : []).filter(function (f) { return f.type === 'file' && /\.(png|jpe?g|gif|webp|mp4)$/i.test(f.name); }).map(function (f) { return f.name; }); })
            .catch(function () { folderFiles[catId] = []; });
    }

    function renderCats() {
        var h = '';
        D.categories.forEach(function (c) {
            h += '<div class="cat' + (c.id === curCat ? ' on' : '') + '" onclick="selectCat(\'' + c.id + '\')">' + c.name + ' <span class="cnt">' + ((D[c.id] || []).length) + '</span></div>';
        });
        document.getElementById('cats').innerHTML = h;
    }
    function renderCatMeta() {
        var c = D.categories.find(function (x) { return x.id === curCat; });
        if (!c) { document.getElementById('catMeta').innerHTML = ''; document.getElementById('dropT').textContent = '폴더를 먼저 만들어주세요'; return; }
        document.getElementById('dropT').textContent = '「' + c.name + '」 폴더에 이미지를 끌어다 놓으세요';
        document.getElementById('catMeta').innerHTML =
            '<div class="cat-meta"><span class="lbl">폴더ID</span><input value="' + esc(c.id) + '" disabled style="width:90px;opacity:.6">' +
            '<span class="lbl">표시명</span><input value="' + esc(c.name) + '" oninput="updCat(\'' + c.id + '\',\'name\',this.value)" style="width:150px">' +
            '<span class="lbl">부제</span><input value="' + esc(c.sub) + '" oninput="updCat(\'' + c.id + '\',\'sub\',this.value)" style="width:190px">' +
            '<span class="lbl">번호</span><input value="' + esc(c.num) + '" oninput="updCat(\'' + c.id + '\',\'num\',this.value)" style="width:50px">';
    }
    function updCat(id, k, v) { var c = D.categories.find(function (x) { return x.id === id; }); if (c) { c[k] = v; setDirty(true); if (k === 'name') { renderCats(); document.getElementById('dropT').textContent = '「' + v + '」 폴더에 이미지를 끌어다 놓으세요'; } } }
    function selectCat(id) { curCat = id; renderCats(); renderCatMeta(); renderItems(); }

    function renderItems() {
        var g = document.getElementById('grid');
        if (!curCat) { g.innerHTML = '<div class="empty">폴더를 선택하거나 만들어주세요</div>'; return; }
        var items = D[curCat] || [];
        var inData = {}; items.forEach(function (it) { inData[it.file] = 1; });
        var orphan = (folderFiles[curCat] || []).filter(function (f) { return !inData[f]; });
        var h = '';
        if (orphan.length) { h += '<div class="empty" style="padding:13px"><b style="color:var(--amber)">폴더에 ' + orphan.length + '개 파일이 더 있어요</b> (목록에 없음) <button class="syncbtn" onclick="syncOrphans()">↓ 목록에 추가</button></div>'; }
        if (!items.length && !orphan.length) { g.innerHTML = '<div class="empty">이미지가 없어요. 위에 끌어다 놓아 추가하세요 📂</div>'; return; }
        items.forEach(function (it, i) {
            var exists = (folderFiles[curCat] || []).indexOf(it.file) >= 0;
            h += '<div class="pcard' + (exists ? '' : ' missing') + '" draggable="true" data-i="' + i + '">';
            if (curCat === 'portfolio' && exists) {
                h += '<div class="pcard-imgwrap"><img src="' + base(curCat) + encodeURIComponent(it.file) + '" loading="lazy" alt="">';
            } else if (curCat === 'portfolio' && !exists && it.content) {
                h += '<div class="pcard-imgwrap"><img src="' + URL.createObjectURL(it.content) + '" loading="lazy" alt="">';
            } else if (curCat === 'rigging' && exists) {
                h += '<div class="pcard-videowrap"><video src="' + base(curCat) + encodeURIComponent(it.file) + '" controls loading="lazy" alt="">';
            } else if (curCat === 'rigging' && !exists && it.content) {
                h += '<div class="pcard-videowrap"><video src="' + URL.createObjectURL(it.content) + '" controls loading="lazy" alt="">';
            }
            h += '<div class="pcard-num">' + (i + 1) + '</div>' +
                '<button class="pcard-del" onclick="delItem(' + i + ')">×</button>' +
                '<div class="pcard-mv"><button onclick="mv(' + i + ',-1)">↑</button><button onclick="mv(' + i + ',1)">↓</button></div></div>' +
                '<div class="pcard-meta">' +
                '<input value="' + esc(it.file) + '" placeholder="파일명" oninput="updItem(' + i + ',\'file\',this.value)">' +
                '<input value="' + esc(it.title) + '" placeholder="제목" oninput="updItem(' + i + ',\'title\',this.value)">' +
                '<input class="tag" value="' + escTag(curCat, it.tag) + '" placeholder="태그 (예: Full Model)" oninput="updItem(' + i + ',\'tag\',this.value)">' +
                '</div></div>';
        });
        g.innerHTML = h; bindDrag(); renderCats();
    }
    function updItem(i, k, v) { D[curCat][i][k] = v; setDirty(true); }
    function delItem(i) {
        var it = D[curCat][i];
        if (!confirm('"' + (it.title || it.file) + '" 를 목록에서 뺄까요?')) return;
        if (!it.uuid) {
            delFileList.push({ id: curCat, name: it.file, sha: it.sha });
        } else {
            addFileList = addFileList.filter(item => item.uuid !== it.uuid);
        }
        D[curCat].splice(i, 1); setDirty(true); renderItems();
    }
    function mv(i, d) { var j = i + d; if (j < 0 || j >= D[curCat].length) return; var t = D[curCat][i]; D[curCat][i] = D[curCat][j]; D[curCat][j] = t; setDirty(true); renderItems(); }
    function syncOrphans() {
        var inData = {}; (D[curCat] || []).forEach(function (it) { inData[it.file] = 1; });
        (folderFiles[curCat] || []).forEach(function (f) { if (!inData[f]) { D[curCat].push({ file: f, title: f.replace(/\.[^.]+$/, ''), title_en: '', tag: '' }); } });
        setDirty(true); renderItems(); toast('폴더 파일을 목록에 추가했어요 (저장 필요)', 'ok');
    }

    var dragI = null;
    function bindDrag() {
        document.querySelectorAll('.pcard').forEach(function (card) {
            card.addEventListener('dragstart', function () { dragI = parseInt(card.dataset.i); card.classList.add('dragging'); });
            card.addEventListener('dragend', function () { card.classList.remove('dragging'); document.querySelectorAll('.pcard').forEach(function (c) { c.classList.remove('dragover'); }); });
            card.addEventListener('dragover', function (e) { e.preventDefault(); card.classList.add('dragover'); });
            card.addEventListener('dragleave', function () { card.classList.remove('dragover'); });
            card.addEventListener('drop', function (e) { e.preventDefault(); var to = parseInt(card.dataset.i); if (dragI === null || dragI === to) return; var m = D[curCat].splice(dragI, 1)[0]; D[curCat].splice(to, 0, m); dragI = null; setDirty(true); renderItems(); });
        });
    }

    var drop = document.getElementById('drop');
    ['dragenter', 'dragover'].forEach(function (ev) { drop.addEventListener(ev, function (e) { e.preventDefault(); e.stopPropagation(); drop.classList.add('over'); }); });
    ['dragleave', 'drop'].forEach(function (ev) { drop.addEventListener(ev, function (e) { e.preventDefault(); e.stopPropagation(); drop.classList.remove('over'); }); });
    drop.addEventListener('drop', function (e) { var f = e.dataTransfer.files; if (f && f.length) handleFiles(f); });

    function handleFiles(fileList) {
        var c = ghCfg(); if (!c.token) { toast('GitHub 토큰이 필요해요 (커미션편집 ⚙ 설정)', 'err'); return; }
        if (!curCat) { toast('먼저 폴더를 선택/생성하세요', 'err'); return; }
        var imgs = Array.prototype.slice.call(fileList).filter(function (f) { return /^image\//.test(f.type); });
        if (!imgs.length) return;
        var prog = document.getElementById('prog'), fill = document.getElementById('progFill');
        prog.classList.add('show'); fill.style.width = '0%';
        status('파일 읽는 중... (' + imgs.length + '장)', 'load');
        var done = 0;
        imgs.forEach(function (file) {
            var rd = new FileReader();
            rd.onload = function () {
                var content = rd.result.split(',')[1];
                var name = file.name.replace(/[^\w.\-가-힣]/g, '_');
                var uuid = self.crypto.randomUUID();
                addFileList.push({ id: curCat, name: name, content: content, uuid: uuid, sha: '' });
                if (!(D[curCat] || []).some(function (it) { return it.file === name; })) {
                    D[curCat].push({ file: name, title: name.replace(/\.[^.]+$/, ''), title_en: '', tag: curCat === 'portfolio' ? 'Live2D' : 'Rigging', content: file, uuid: uuid, sha: '' });
                }
                setDirty(true);
                done++;
                fill.style.width = Math.round(done / imgs.length * 100) + '%';
                if (done === imgs.length) {
                    status('준비됨 · 💾 저장하세요', 'ok');
                    toast(imgs.length + '장 추가됨 · 💾 저장하세요', 'ok');
                    setTimeout(function () { prog.classList.remove('show'); renderItems(); }, 900);
                }
            };
            rd.readAsDataURL(file);
        });
        document.getElementById('fileInput').value = '';
    }

    function buildJson() {
        var out = { updated: new Date().toISOString(), categories: D.categories };
        D.categories.forEach(function (c) {
            out[c.id] = (D[c.id] || []).map(function (it) {
                return { file: it.file, title: it.title, title_en: it.title_en || '', tag: it.tag || ''};
            });
        });
        return out;
    }

    // ─────────────────────────────────────────────────────────────────
    // Git Tree API — 모든 변경을 커밋 1개로 묶어서 Actions 충돌 방지
    // 흐름: HEAD SHA → Tree SHA → 새 Tree → 새 Commit → ref 업데이트
    // ─────────────────────────────────────────────────────────────────
    async function save() {
        const c = ghCfg();
        if (!c.token) { toast('토큰이 필요해요 (커미션편집 ⚙)', 'err'); return; }

        const prog = document.getElementById('prog');
        const fill = document.getElementById('progFill');
        prog.classList.add('show'); fill.style.width = '5%';
        status('저장 중...', 'load');

        const api = `https://api.github.com/repos/${c.user}/${c.repo}`;
        const headers = { 'Authorization': 'token ' + c.token, 'Content-Type': 'application/json' };

        try {
            // ① HEAD SHA + base tree SHA
            fill.style.width = '15%';
            const refRes = await fetch(`${api}/git/refs/heads/main`, { headers });
            if (!refRes.ok) throw new Error('브랜치 정보를 읽지 못했어요');
            const headSha = (await refRes.json()).object.sha;

            const commitRes = await fetch(`${api}/git/commits/${headSha}`, { headers });
            if (!commitRes.ok) throw new Error('커밋 정보를 읽지 못했어요');
            const baseTreeSha = (await commitRes.json()).tree.sha;

            fill.style.width = '30%';

            // ② tree 노드 구성
            const treeNodes = [];

            // 추가 파일: 이미지는 blob API로 먼저 올리고 sha 참조
            for (const f of addFileList) {
                const blobRes = await fetch(`${api}/git/blobs`, {
                    method: 'POST', headers,
                    body: JSON.stringify({ content: f.content, encoding: 'base64' })
                });
                if (!blobRes.ok) throw new Error(`blob 생성 실패: ${f.name}`);
                const blobSha = (await blobRes.json()).sha;

                treeNodes.push({
                    path: `${f.id}/${f.name}`,
                    mode: '100644',
                    type: 'blob',
                    sha: blobSha
                });
            }

            // 삭제 파일: sha null = 트리에서 제거
            for (const f of delFileList) {
                treeNodes.push({
                    path: `${f.id}/${f.name}`,
                    mode: '100644',
                    type: 'blob',
                    sha: null
                });
            }

            // data/file.json: 텍스트라 content 직접 가능
            treeNodes.push({
                path: 'data/file.json',
                mode: '100644',
                type: 'blob',
                content: JSON.stringify(buildJson(), null, 2)
            });

            fill.style.width = '60%';

            // ③ 새 tree 생성
            const newTreeRes = await fetch(`${api}/git/trees`, {
                method: 'POST', headers,
                body: JSON.stringify({ base_tree: baseTreeSha, tree: treeNodes })
            });
            if (!newTreeRes.ok) {
                const err = await newTreeRes.json();
                throw new Error('Tree 생성 실패: ' + (err.message || ''));
            }
            const newTreeSha = (await newTreeRes.json()).sha;

            fill.style.width = '75%';

            // ④ 커밋 생성
            const msgParts = [];
            if (addFileList.length) msgParts.push(`📷 파일 추가 ${addFileList.length}개`);
            if (delFileList.length) msgParts.push(`🗑 파일 삭제 ${delFileList.length}개`);
            msgParts.push('🖼 data.json 업데이트');

            const newCommitRes = await fetch(`${api}/git/commits`, {
                method: 'POST', headers,
                body: JSON.stringify({ message: msgParts.join(' · '), tree: newTreeSha, parents: [headSha] })
            });
            if (!newCommitRes.ok) {
                const err = await newCommitRes.json();
                throw new Error('커밋 생성 실패: ' + (err.message || ''));
            }
            const newCommitSha = (await newCommitRes.json()).sha;

            fill.style.width = '90%';

            // ⑤ ref 업데이트 (push)
            const updateRes = await fetch(`${api}/git/refs/heads/main`, {
                method: 'PATCH', headers,
                body: JSON.stringify({ sha: newCommitSha })
            });
            if (!updateRes.ok) {
                const err = await updateRes.json();
                throw new Error('Push 실패: ' + (err.message || ''));
            }

            fill.style.width = '100%';
            addFileList = [];
            delFileList = [];
            setDirty(false);
            status('저장됨 ✓', 'ok');
            toast('저장 완료! 커밋 1개로 배포됩니다 🎉', 'ok');
            setTimeout(() => window.location.reload(), 1200);

        } catch (e) {
            console.error(e);
            status('실패', 'err');
            toast('오류: ' + e.message, 'err');
            prog.classList.remove('show');
        }
    }

    window.addEventListener('beforeunload', function (e) { if (dirty) { e.preventDefault(); e.returnValue = ''; } });
    loadAll();
</script>
</body>
