<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODE — 커미션</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --bg:      #faf9f7;
            --bg2:     #f4f2ef;
            --bg3:     #edeae5;
            --ink:     #0f0f0d;
            --ink60:   rgba(15,15,13,0.6);
            --ink35:   rgba(15,15,13,0.35);
            --ink15:   rgba(15,15,13,0.15);
            --line:    rgba(15,15,13,0.1);
            --line2:   rgba(15,15,13,0.18);
            --accent:    #ff6b6b;
            --accent-d:  #e74c4c;
            --accent-l:  #ffc9c9;
            --accent-bg: #fff5f5;
            --r: 0;
            --r-sm: 0;
            --r-xs: 0;
            --sh-md: 0 22px 70px rgba(15,15,13,0.08);
            --ink2: rgba(15,15,13,0.72);
            --ink3: rgba(15,15,13,0.45);
            --serif:   'Cormorant Garamond',serif;
            --sans:    'Noto Sans KR',sans-serif;
        }
        body{
            background:
                radial-gradient(circle at 50% -20%, rgba(15,15,13,0.07), transparent 34rem),
                var(--bg);
            color:var(--ink);
            font-family:var(--sans);
            font-weight:300;
            line-height:1.7;
            font-size:14px;
            padding:20px;
        }
        body::before{
            content:'';
            position:fixed;
            inset:0;
            pointer-events:none;
            border:18px solid var(--ink);
            z-index:9000;
        }
        body > nav,
        body > .hero,
        body > .section,
        body > .total-bar,
        body > footer{
            width:min(1180px, calc(100% - 72px));
            margin-left:auto;
            margin-right:auto;
        }

        /* ── NAV ── */
        nav{
            /*position:sticky;*/
            top:0;z-index:100;
            background:var(--bg);
            /*border-bottom:1px solid var(--line);*/
            display:flex;align-items:center;justify-content:space-between;
            padding:26px 0 18px;
        }
        .nav-logo{font-family:var(--serif);font-size:26px;font-weight:400;letter-spacing:0.32em;color:var(--ink);}
        .nav-sub{font-size:12px;letter-spacing:0.25em;color:var(--ink35);text-transform:uppercase;margin-top:2px;}
        .nav-lang{display:flex;gap:8px;}
        .lang-btn{
            font-size:13px;letter-spacing:0.15em;color:var(--ink35);
            border:1px solid var(--line2);padding:5px 14px;
            background:transparent;cursor:pointer;transition:all .2s;
            font-family:var(--sans);
        }
        .lang-btn.active{color:var(--ink);border-color:var(--ink);background:var(--ink);color:var(--bg);}
        .lang-btn.active:hover{opacity:.65;color:var(--bg);}
        .lang-btn:hover{border-color:var(--ink);color:var(--ink);}

        /* ── HERO ── */
        .hero{
            padding:54px 0 50px;
            border-top:1px solid var(--line);
            border-bottom:1px solid var(--line);
            display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;
            background:var(--bg);
        }
        .hero-box{display: flex;flex-direction: column;gap: 30px;}
        .hero-desc{font-size:18px;color:var(--ink60);margin-bottom:60px;line-height:1.9;max-width:420px;word-break:keep-all;}
        .hero-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom: 20px;}
        .tag{font-size:12px;letter-spacing:0.12em;color:var(--ink60);border:1px solid var(--line2);padding:5px 14px;}
        .dotlive{display:inline-flex;width:7px;height:7px;margin-right:10px;border-radius:50%;background:var(--accent-d);box-shadow:0 0 0 0 rgba(236,90,158,.5);animation:pulse 1.8s infinite}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(236,90,158,.5)}70%{box-shadow:0 0 0 7px rgba(236,90,158,0)}100%{box-shadow:0 0 0 0 rgba(236,90,158,0)}}
        .hero-ctas{display:flex;gap:12px;}
        .btn-primary{
            padding:14px 36px;background:var(--ink);color:var(--bg);
            font-family:var(--sans);font-size:12px;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;
            border:none;cursor:pointer;transition:opacity .2s;
        }
        .btn-primary:hover{opacity:.65;}
        .btn-outline{
            padding:14px 36px;background:transparent;color:var(--ink60);
            font-family:var(--sans);font-size:12px;letter-spacing:0.25em;text-transform:uppercase;
            border:1px solid var(--line2);cursor:pointer;transition:all .2s;
        }
        .btn-outline:hover{border-color:var(--ink);color:var(--ink);}

        /* Hero right — big ODE mark */
        .hero-mark{
            display:flex;flex-direction:column;align-items:flex-end;justify-content:center;
            gap:16px;
        }
        .hero-mark img{
            display:block;
            width:min(83%, 520px);
            height:auto;
            border:1px solid var(--line);
            background:#000;
        }

        /* ── SECTION ── */
        .section{padding:34px 36px;
            border-bottom:1px solid var(--line);
        }
        .section-head{margin-bottom:20px;}
        .section-eyebrow{font-size:12px;letter-spacing:0.4em;color:var(--ink35);text-transform:uppercase;margin-bottom:10px;}
        .section-title{font-family:var(--sans);font-size:24px;font-weight:300;color:var(--ink);}

        /* ── SLOTS ── */
        .slot-row{
            display:grid;grid-template-columns:72px 1fr auto;
            align-items:center;gap:24px;
            padding:22px 0;
            border-bottom:1px solid var(--line);
        }
        /*.slot-row:first-child{border-top:1px solid var(--line);}*/
        .slot-row:last-child{border-bottom: none}
        .slot-month{
            /*font-family:var(--serif);*/
            font-size:18px;font-weight:300;color:var(--ink35);}
        .slot-dots{display:flex;gap:8px;}
        .dot{
            width:20px;height:20px;border-radius:50%;
            border:1px solid var(--line2);
            display:flex;align-items:center;justify-content:center;
        }
        .dot.filled{background:var(--ink);border-color:var(--ink);}
        .dot.open{border-color:var(--ink);border-style:dashed;}
        .slot-status{font-size:12px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 16px;border:1px solid;}
        .slot-status.closed{color:var(--ink35);border-color:var(--line2);}
        .slot-status.open{color:var(--ink);border-color:var(--ink);}

        /* ── PORTFOLIO ── */
        .port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
        .port-item{
            aspect-ratio:3.27/4;
            background:var(--bg2);
            border:1px solid var(--line);
            overflow:hidden;position:relative;cursor:pointer;
            transition:border-color .2s, transform .2s;
        }
        .port-item:hover{border-color:var(--ink);transform:translateY(-2px);}
        .port-item img{width:100%;height:100%;display:block;filter:saturate(.82) contrast(1.02);}
        .port-placeholder{
            width:100%;height:100%;
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
        }
        .port-item:hover .port-overlay{opacity:1;}

        /* ── RIGGING ── */
        .rigg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
        .rigg-item{
            aspect-ratio:2.8/4;
            background:#ffffff;
            border:1px solid var(--line);
            overflow:hidden;position:relative;cursor:pointer;
            transition:border-color .2s, transform .2s;
        }
        .rigg-item:hover{border-color:var(--ink);transform:translateY(-2px);}
        .rigg-item video{width:100%;height:100%;display:block;filter:saturate(.82) contrast(1.02);}
        .rigg-item:hover .port-overlay{opacity:1;}

        .cap{position:absolute;left:12px;right:12px;bottom:10px;color:var(--bg);font-size:10px;letter-spacing:.14em;text-transform:uppercase;text-shadow:0 1px 12px rgba(0,0,0,.6);}
        .port-loading,.port-empty{text-align:center;padding:34px;color:var(--ink3);font-size:13px;font-weight:600}
        .port-viewer{display:none;position:relative;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);padding:16px;margin-bottom:16px;text-align:center}
        .port-viewer.open{display:block;animation:fade .2s}
        .port-viewer img{max-width:75%;border-radius:var(--r-sm);display:block;margin:0 auto}
        .port-viewer .pv-x{position:absolute;top:10px;right:10px;width:38px;height:38px;border:1px solid var(--line);background:var(--bg);border-radius:var(--r-sm);font-size:16px;font-weight:800;color:var(--ink2);cursor:pointer;z-index:2}
        .port-viewer .pv-x:hover{border-color:var(--ink);color:var(--ink)}
        .port-viewer .pv-bar{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:12px}
        .port-viewer .pv-nav{width:44px;height:44px;border:1px solid var(--line);background:var(--bg);border-radius:var(--r-sm);font-size:22px;font-weight:800;color:var(--ink);cursor:pointer;line-height:1}
        .port-viewer .pv-nav:hover{background:var(--sky-pl);border-color:var(--sky-l)}
        .port-viewer .pv-cap{font-size:13px;font-weight:700;color:var(--ink2);min-width:90px}
        .lb{display:none;position:fixed;inset:0;z-index:6000;background:rgba(15,40,65,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px;flex-direction:column;gap:14px}
        .lb.open{display:flex;animation:fade .2s}
        @keyframes fade{from{opacity:0}to{opacity:1}}
        .lb img{max-width:92vw;max-height:78vh;border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
        .lb-cap{color:#fff;font-weight:700;font-size:14px}
        .lb-nav{display:flex;gap:12px}
        .lb-nav button,.lb-x{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:var(--r-sm);padding:9px 20px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;transition:background .15s}
        .lb-nav button:hover,.lb-x:hover{background:rgba(255,255,255,.3)}
        .lb-x{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:var(--r-sm);padding:0;font-size:18px}



        /* ── STEPS ── */
        .steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
        .step-item{background:var(--bg2);border:1px solid var(--line);padding:24px 22px;}
        .step-item.highlight{background:var(--ink);color:var(--bg);}
        .step-num{font-size:12px;letter-spacing:0.2em;color:var(--ink60);margin-bottom:10px;text-transform:uppercase;}
        /*.step-item.highlight .step-num{color:rgba(250,249,247,0.4);}*/
        .step-item.highlight .step-num{color:var(--bg);}
        .step-name{font-family:var(--sans);font-size:20px;font-weight:300;}
        .step-sub{font-size:12px;color:var(--ink60);margin-top:4px;}
        /*.step-item.highlight .step-sub{color:rgba(250,249,247,0.45);}*/
        .step-item.highlight .step-sub{color:var(--bg);}

        /* ── PRICING ── */
        .pricing-block{margin-bottom:48px;}
        .pricing-block-title{
            font-size:15px;letter-spacing:0.3em;color:var(--ink35);text-transform:uppercase;
            /*border-bottom:1px solid var(--line);*/
            padding-bottom:10px;margin-bottom:10px;
            display:flex;align-items:center;gap:10px;
        }
        .new-badge{
            font-size:12px;letter-spacing:0.12em;
            background:var(--ink);color:var(--bg);
            padding:2px 8px;
        }
        .accent-rule{width:28px;height:1px;background:var(--ink15);display:inline-block;vertical-align:middle;}
        .note{font-size:12px;color:var(--ink60);margin-bottom:10px;line-height:1.6;font-weight:600;}
        .hint{font-size:12px;color:var(--ink60);margin-top:9px;font-weight:600}
        .price-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
        .price-card{background:var(--bg2);border:1px solid var(--line);padding:24px 20px;}
        .price-card.featured{background:var(--ink);color:var(--bg);}
        .price-card-name{font-size:13px;letter-spacing:0.12em;color:var(--ink60);text-transform:uppercase;margin-bottom:12px;}
        .price-card.featured .price-card-name{color:rgba(250,249,247,0.9);}
        .price-card-amount{font-family:var(--sans);font-size:18px;font-weight:300;}
        .price-card-note{font-size:13px;color:var(--ink60);margin-top:10px;line-height:1.6;}
        .price-card.featured .price-card-note{color:rgba(250,249,247,0.8);}

        /* EXPRESSION TAGS */
        .expr-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
        .expr-tag{
            font-size:12px;letter-spacing:0.1em;
            border:1px solid var(--line2);padding:6px 16px;
            color:var(--ink60);cursor:pointer;transition:all .2s;background:transparent;
            font-family:var(--sans);
        }
        .expr-tag:hover,.expr-tag.active{border-color:var(--ink);color:var(--ink);background:var(--bg2);}

        /* OPTIONS */
        .options-list{display:flex;flex-direction:column;gap:2px;}
        .option-item{
            display:grid;grid-template-columns:1fr auto;align-items:center;
            background:var(--bg);border:1px solid var(--line);
            padding:16px 20px;gap:16px;
            transition:background .15s;
        }
        .option-item:hover{background:var(--bg2);}
        .opt-name{font-size:13px;color:var(--ink);}
        .opt-price{font-size:11px;color:var(--ink35);margin-top:3px;}
        .qty-ctrl{display:flex;align-items:center;}
        .qty-btn{
            width:30px;height:30px;background:transparent;
            border:1px solid var(--line2);color:var(--ink60);
            font-size:16px;cursor:pointer;transition:all .15s;
            display:flex;align-items:center;justify-content:center;font-family:var(--sans);
        }
        .qty-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--bg2);}
        .qty-val{
            width:38px;height:30px;text-align:center;align-content: center;
            background:transparent;
            border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);
            border-left:none;border-right:none;
            color:var(--ink);font-family:var(--sans);font-size:12px;
        }

        /* FORM */
        .form-grid{display:flex;flex-direction:column;gap:3px;}
        .form-item{background:var(--bg2);border:1px solid var(--line);padding:22px 24px;}
        .form-label{
            font-size:13px;letter-spacing:0.25em;color:var(--ink60);text-transform:uppercase;
            margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;
        }
        textarea,input[type=text],input[type=email],input[type=url]{
            width:100%;background:var(--bg);
            border:1px solid var(--line);
            color:var(--ink);font-family:var(--sans);font-size:13px;font-weight:300;
            padding:12px 14px;resize:vertical;outline:none;
            transition:border-color .2s;
        }
        textarea:focus,input:focus{border-color:var(--ink);}
        textarea{min-height:72px;}
        ::placeholder{color:var(--ink35);}

        /* live preview */
        .preview-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-md);position:sticky;top:16px;margin-top: 46px;}
        .preview-head{background:var(--sky-pl);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
        .preview-head-t{font-size:13px;font-weight:900;color:var(--ink)}
        .preview-head-b{font-size:9px;font-weight:900;letter-spacing:.1em;color:var(--bg);background:var(--ink);padding:3px 8px;border-radius:var(--r-xs);animation:pulse2 2.4s infinite}
        @keyframes pulse2{0%,100%{opacity:1}50%{opacity:.55}}
        .preview-body{padding:14px 16px;font-family:'Noto Sans KR',monospace;font-size:11.5px;line-height:1.85;white-space:pre-wrap;color:var(--ink);max-height:46vh;overflow-y:auto;background:var(--sky-bg)}
        .preview-total{padding:14px 18px;border-top:1px solid var(--line);background:var(--sky-pl);text-align:center}
        .preview-total-lbl{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:4px}
        .preview-total-amt{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--sky-d);line-height:1}
        .preview-total-won{font-size:15px;font-weight:900;color:var(--ink2)}
        .preview-total-cnt{font-size:11px;color:var(--ink3);font-weight:700}
        .preview-copy{width:100%;padding:15px;border:none;background:var(--ink);color:var(--bg);font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;transition:opacity .15s;letter-spacing:.02em}
        .preview-copy:hover{opacity:.9}
        .preview-reset{display:block;width:100%;padding:8px;border:none;border-top:1px solid var(--line);background:var(--bg);color:var(--ink3);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer}
        .preview-reset:hover{color:var(--ink)}

        .form-2col{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start;margin-top:18px}
        @media(max-width:860px){.form-2col{grid-template-columns:1fr}.preview-card{position:static}}

        /* ACCORDION */
        .accord-list{display:flex;flex-direction:column;gap:2px;}
        .accord-item{border:1px solid var(--line);overflow:hidden;}
        .accord-head{
            padding:18px 22px;cursor:pointer;
            display:flex;align-items:center;justify-content:space-between;
            background:var(--bg2);transition:background .15s;
        }
        .accord-head:hover{background:var(--bg3);}
        .accord-head-left{display:flex;align-items:center;gap:12px;}
        .accord-icon{font-size:12px;color:var(--ink35);}
        .accord-label{font-size:12px;color:var(--ink60);letter-spacing:0.05em;}
        .accord-arrow{font-size:11px;color:var(--ink35);transition:transform .25s;}
        .accord-item.open .accord-arrow{transform:rotate(180deg);}
        .accord-body{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--bg);}
        .accord-item.open .accord-body{max-height:400px;}
        .accord-content{padding:22px 24px;font-size:13px;color:var(--ink60);line-height:2;white-space:pre-line;}

        /* toast */
        .toast{width:350px;margin-top:10px;background:var(--ink);color:#fff;padding:12px 22px;border-radius:var(--r-sm);font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:all .3s;}
        .toast.show{opacity:1;}

        /* section heading */
        #sideMini{display:none;position:fixed;top:84px;margin-left:20px;z-index:500;width:150px;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--sh-md);padding:12px 13px}
        #sideMini.show{display:block}
        .sm-tl{font-size:10px;font-weight:800;color:var(--ink3);letter-spacing:.05em}
        .sm-amt{font-size:16px;font-weight:900;color:var(--sky-d);margin:2px 0 9px;font-variant-numeric:tabular-nums}
        .sm-nav{display:flex;flex-direction:column;gap:1px;border-top:1px solid var(--line2);padding-top:7px}
        .sm-link{font-size:11.5px;font-weight:700;color:var(--ink2);padding:5px 7px;border-radius:6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .sm-link:hover{background:var(--sky-pl);color:var(--sky-d)}
        @media(max-width:780px){#sideMini{display:none!important}}
        .sec-title{font-size:18px;font-weight:900;letter-spacing:-.01em;color:var(--ink)}


        /* FOOTER */
        footer{
            padding:28px 0;
            display:flex;align-items:center;justify-content:space-between;
            border-top:1px solid var(--line);
            background:var(--bg);
        }
        .footer-logo{font-family:var(--serif);font-size:16px;letter-spacing:0.4em;color:var(--ink35);}
        .footer-copy{font-size:9px;letter-spacing:0.2em;color:var(--ink15);text-transform:uppercase;}

        @media(max-width:768px){
            body::before{border-width:10px;}
            body > nav,
            body > .hero,
            body > .section,
            body > footer{width:min(100% - 32px, 1180px);}
            nav,.section,.hero,footer,.total-bar{padding-left:0;padding-right:0;}
            nav{align-items:flex-start;gap:14px;flex-direction:column;}
            .nav-lang{width:100%;}
            .lang-btn{flex:1;}
            .hero{grid-template-columns:1fr;}
            .hero-mark{display:flex;align-items:center;order:-1;}
            .hero-mark img{width:100%;max-height:360px;object-fit:cover;}
            .port-grid{grid-template-columns:repeat(2,1fr);}
            .rigg-grid{grid-template-columns:repeat(2,1fr);}
            .steps-grid,.steps-row2{grid-template-columns:repeat(2,1fr);}
            .price-cards{grid-template-columns:repeat(2,1fr);}
            .hero-ctas{flex-direction:column;}
            .btn-primary,.btn-outline{width:100%;}
            .slot-row{grid-template-columns:72px 1fr auto;gap:12px;}
            .preview-card{margin-top: 10px;}
            footer{align-items:flex-start;flex-direction:column;gap:8px;}
        }
        @media(max-width:520px){
            .port-grid,.rigg-grid,.price-cards,.steps-grid,.steps-row2{grid-template-columns:1fr;}
            .hero-desc{font-size:15px;}
            .section{padding:28px 0;}
            .option-item{grid-template-columns:1fr auto;align-items:flex-start;}
            .qty-ctrl{width:100%;}
            .qty-btn,.qty-val{flex:1;}
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <div>
        <div class="nav-logo">ODE</div>

        document.getElementById('heroTags').innerHTML=h;
    }

    function renderSlots(){
        var u=UI[lang],h='';
        DATA.slots.forEach(function(s){
            var open=s.filled.filter(function(f){return !f;}).length,full=open===0;
            h+='<div class="slot-row"><div class="slot-month">'+s[lang]+'</div><div class="slot-dots">';
            s.filled.forEach(function(f){h+='<div class="dot '+(f?'filled':'open')+'"></div>';});
            h+='</div><span class="slot-status '+(full?'closed':'open')+'">'+(full?u.slotFull:u.slotOpen(open))+'</span></div>';
        });
        document.getElementById('slotRows').innerHTML=h;
    }

    function renderWork(){
        var h='';
        STEPS.forEach(function(s){
            var name=lang==='ko'?s.ko:s.en, sub=lang==='ko'?s.koSub:s.enSub;
            h+='<div class="step-item'+(s.last?' highlight':'')+'"><div class="step-num">'+s.num+'</div><div class="step-name">'+name+'</div>'+(sub?'<div class="step-sub">'+sub+'</div>':'')+'</div>';
        });
        document.getElementById('stepGrid').innerHTML=h;
    }

    function renderForm(){
        var h='';
        DATA.sections.forEach(function(sec){
            h+='<div class="pricing-block"><div class="pricing-block-title"><span class="accent-rule"></span>'+sec[lang];
            var tag=lang==='ko'?sec.tagKo:sec.tagEn; if(tag)h+='<span class="new-badge">'+tag+'</span>';
            h+='</div>';
            var note=lang==='ko'?sec.noteKo:sec.noteEn; if(note)h+='<div class="note">'+note+'</div>';
            if(sec.type==='radio'){
                h+='<div class="price-cards">';
                sec.items.forEach(function(it){
                    var sub=lang==='ko'?it.subKo:it.subEn;
                    h+='<div class="price-card'+(sel[sec.id]===it.id?' featured':'')+'" id="pc-'+it.id+'" onclick="pickRadio(\''+sec.id+'\',\''+it.id+'\')">'+
                        '<div class="price-card-name">'+it[lang]+'</div><div class="price-card-amount">'+won(it.p)+' '+UI[lang].won+'</div>'+(sub?'<div class="price-card-note">'+sub+'</div>':'')+'</div>';
                });
                h+='</div>';
            } else if(sec.type==='qty'||sec.type==='pill'){ // 수량·다중선택: 박스 + [ − N + ] 스테퍼 (통일)
                h+='<div class="options-list">';
                sec.items.forEach(function(it){
                    var q=(sel[sec.id]&&sel[sec.id][it.id])||0;
                    h+='<div class="option-item'+(q>0?' on':'')+'" id="qi-'+it.id+'">'+
                        '<div>' +
                            '<div class="opt-name">'+it[lang]+'</div>'+
                            '<div class="opt-price" id="qp-'+it.id+'">'+won(it.p)+' '+UI[lang].won+(q>1?' × '+q+' = '+won(it.p*q):'')+'</div>' +
                        '</div>'+
                        '<div class="qty-ctrl">' +
                            '<button class="qty-btn" onclick="setQty(\''+sec.id+'\',\''+it.id+'\',-1)">−</button>'+
                            '<span class="qty-val" id="qn-'+it.id+'">'+q+'</span>'+
                            '<button class="qty-btn" onclick="setQty(\''+sec.id+'\',\''+it.id+'\',1)">＋</button>' +
                        '</div>' +
                        '</div>';
                });
                h+='</div>';
            } else { // expr (기본 제공 표정) — 토글 pill
                h+='<div class="expr-grid">';
                sec.items.forEach(function(it){
                    var on=sel[sec.id]&&sel[sec.id][it.id];
                    var price=sec.type==='expr'?'':' <span class="pp">+'+won(it.p)+'</span>';
                    h+='<span class="expr-tag'+(on?' active':'')+'" id="pl-'+it.id+'" onclick="togglePill(\''+sec.id+'\',\''+it.id+'\')">'+it[lang]+price+'</span>';
                });
                h+='</div>' +
                    '<div class="toast" id="toast"></div>';
            }
            var hint=lang==='ko'?sec.hintKo:sec.hintEn; if(hint)h+='<div class="hint">'+hint+'</div>';
            h+='</div></div>';
        });
        document.getElementById('formGroups').innerHTML=h;
    }
    function renderApplyFill(){
        var u=UI[lang];
        var h='<div class="pricing-block-title"><span class="accent-rule"></span>&nbsp;'+u.lApply+'</div>'
        + '<div class="form-grid">';
        DATA.apply.forEach(function(q,i){
            var prev=document.getElementById('aq_'+i); var val=prev?prev.value:'';
            h+='<div class="form-item"><div class="form-label">'+q[lang]+'</div>';
            if(q.type==='textarea') {
                h+='<textarea class="ta" id="aq_'+i+'" style="min-height:54px" oninput="rebuild()">'+val.replace(/</g,'&lt;')+'</textarea></div>';
            }
            else if (q.type==='url') {
                h+='<input class="ta" id="aq_'+i+'" placeholder="https://..." oninput="rebuild()" type="url">'+val.replace(/</g,'&lt;')+'</div>';
            }
            else if (q.type==='email') {
                h+='<input class="ta" id="aq_'+i+'" placeholder="example@gmail.com" oninput="rebuild()" type="email">'+val.replace(/</g,'&lt;')+'</div>';
            }
        });
        h+='</div>';
        document.getElementById('aqFill').innerHTML=h;
    }

    function renderNotice() {
        var h='';
        DATA.notice.forEach(function(s){
            var q=lang==='ko'?s.qKo:s.qEn;
            var a=lang==='ko'?s.aKo:s.aEn;
            h+='<div class="accord-item">' +
                '<div class="accord-head" onClick="toggleAccord(this)">' +
                  '<div class="accord-head-left"><span class="accord-icon">✦</span><span class="accord-label">'+q+'</span></div>' +
                  '<span class="accord-arrow">∨</span>' +
                '</div>' +
                '<div class="accord-body"><div class="accord-content">'+a+'</div></div>' +
                '</div>';
        });
        document.getElementById('accordList').innerHTML=h;
    }

    /* ════════ file = portfolio + rigging ════════ */
    var imgs = [], lbIdx = 0;
    var videos = [];
    function loadFile() {
        fetch("data/file.json")
            .then(r => r.json())
            .then(data => {
                imgs = [];
                videos = [];

                data.portfolio.forEach(f => {
                    var url = 'https://raw.githubusercontent.com/'+GH.user+'/'+GH.repo+'/main/portfolio/'+f.file;
                    if(/\.(png|jpe?g|webp)$/i.test(f.file)){
                        imgs.push({src:url,cap:f.title.replace(/\.[^.]+$/,'')});
                    }
                    document.getElementById('portLoading').style.display='none';
                });
                if(!imgs.length){var e=document.getElementById('portEmpty');e.style.display='block';e.textContent=UI[lang].portEmpty;return;}
                var g='';
                imgs.forEach(function(im,i){g+='<div class="port-item" onclick="openLb('+i+')"><div class="port-placeholder"><img loading="lazy" src="'+im.src+'" alt="'+im.cap+'"></div><div class="cap">'+im.cap+'</div></div>';});
                document.getElementById('portGrid').innerHTML=g;document.getElementById('portWrap').style.display='block';

                data.rigging.forEach(f => {
                    var url = 'https://raw.githubusercontent.com/'+GH.user+'/'+GH.repo+'/main/rigging/'+f.file;
                    if(/\.(mp4|gif)$/i.test(f.file)){
                        videos.push({src:url,cap:f.title.replace(/\.[^.]+$/,'')});
                    }
                    document.getElementById('riggLoading').style.display='none';
                    if(!videos.length){var e=document.getElementById('riggEmpty');e.style.display='block';e.textContent=UI[lang].portEmpty;return;}
                    var g='';
                    videos.forEach(function(im){g+='<div class="rigg-item"><video loading="lazy" src="'+im.src+'" alt="'+im.cap+'" controls width="300" height="200"></video></div>';});
                    document.getElementById('riggGrid').innerHTML=g;document.getElementById('riggWrap').style.display='block';
                });
            })
            .catch(function(){
                document.getElementById('portLoading').style.display='none';var e=document.getElementById('portEmpty');e.style.display='block';e.textContent=UI[lang].portErr;
                document.getElementById('riggLoading').style.display='none';var e=document.getElementById('riggEmpty');e.style.display='block';e.textContent=UI[lang].portErr;
            });
    }

    /* ════════ portfolio ════════ */
    /* iframe 임베드에서도 동작하는 인라인 뷰어 (position:fixed 미사용) */
    function openLb(i){
        if(!imgs.length)return; lbIdx=(i+imgs.length)%imgs.length; var im=imgs[lbIdx];
        document.getElementById('pvImg').src=im.src;
        document.getElementById('pvImg').alt=im.cap;
        document.getElementById('pvCap').textContent=(lbIdx+1)+' / '+imgs.length;
        var v=document.getElementById('portViewer'); v.classList.add('open');
        try{ v.scrollIntoView({behavior:'smooth',block:'center'}); }catch(e){ v.scrollIntoView(); }
    }
    function closeLb(){document.getElementById('portViewer').classList.remove('open');}
    function lbNav(d){openLb(lbIdx+d);}

    /* ════════ selection ════════ */
    function findItem(secId,itId){var s=DATA.sections.find(function(x){return x.id===secId;});return s.items.find(function(i){return i.id===itId;});}
    function pickRadio(secId,itId){
        var sec=DATA.sections.find(function(s){return s.id===secId;});
        sec.items.forEach(function(it){var el=document.getElementById('pc-'+it.id);if(el)el.classList.remove('featured');});
        if(sel[secId]===itId){sel[secId]=null;}else{sel[secId]=itId;document.getElementById('pc-'+itId).classList.add('featured');}
        rebuild();
    }
    function togglePill(secId,itId){
        if(!sel[secId])sel[secId]={};
        var el=document.getElementById('pl-'+itId);
        if(sel[secId][itId]){delete sel[secId][itId];el.classList.remove('active');}
        else{
            var sec=DATA.sections.find(function(s){return s.id===secId;});
            if(sec&&sec.type==='expr'){
                var max=sec.maxFree||5;
                if(Object.keys(sel[secId]).length>=max){ toast(lang==='ko'?('기본 제공 표정은 '+max+'개까지 무료예요'):('Up to '+max+' free expressions')); return; }
            }
            sel[secId][itId]=true;el.classList.add('active');
        }
        rebuild();
    }
    function setQty(secId,itId,d){
        if(!sel[secId])sel[secId]={};
        var cur=(sel[secId][itId]||0)+d; if(cur<0)cur=0;
        setQtyVal(secId,itId,cur);
    }
    function setQtyVal(secId,itId,val){
        if(!sel[secId])sel[secId]={};
        val=parseInt(val,10)||0; if(val<0)val=0;
        if(val===0)delete sel[secId][itId]; else sel[secId][itId]=val;
        var it=findItem(secId,itId);
        var qn=document.getElementById('qn-'+itId); if(qn)qn.textContent=val;
        var qi=document.getElementById('qi-'+itId); if(qi)qi.classList.toggle('on',val>0);
        var qp=document.getElementById('qp-'+itId); if(qp)qp.textContent=won(it.p)+' '+UI[lang].won+(val>1?' × '+val+' = '+won(it.p*val):'');
        rebuild();
    }
    function resetForm(){
        sel={};
        renderForm(); // 라디오/필/수량 전부 초기 상태로 다시 그림
        DATA.apply.forEach(function(q,i){var e=document.getElementById('aq_'+i);if(e)e.value='';});
        rebuild();
    }

    /* ════════ build form text (DASHBOARD-COMPATIBLE, always Korean structure) ════════ */
    function cleanLabel(s){return s.replace(/^[^\wㄱ-힣]+\s*/,'');}
    function buildFormText(){
        var lines=['ODE 작가 · Live2D 의뢰 양식','━━━━━━━━━━━━━━━━━━━━━━━━━━━━',''];
        var total=0, any=false;
        DATA.sections.forEach(function(sec){
            if(sec.type==='radio'){
                if(!sel[sec.id])return; var it=findItem(sec.id,sel[sec.id]); if(!it)return;
                any=true;
                lines.push('▸ '+sec.koLabel); lines.push('  · '+it.ko); lines.push('    → '+won(it.p)+'원'); lines.push('');
                total+=it.p;
            } else if(sec.type==='pill'||sec.type==='qty'){
                if(!sel[sec.id])return; var ids=Object.keys(sel[sec.id]); if(!ids.length)return;
                any=true; lines.push('▸ '+sec.koLabel);
                ids.forEach(function(id){var it=findItem(sec.id,id);var q=sel[sec.id][id]||1;lines.push('  · '+it.ko+(q>1?' × '+q+'개':''));lines.push('    → '+won(it.p*q)+'원');total+=it.p*q;});
                lines.push('');
            } else if(sec.type==='expr'){
                if(!sel[sec.id])return; var ids=Object.keys(sel[sec.id]); if(!ids.length)return;
                var names=ids.map(function(id){return findItem(sec.id,id).ko;});
                lines.push('▸ '+sec.koLabel+' (무료)'); lines.push('  · '+names.join(', ')); lines.push('');
            }
        });
        lines.push('─────────────────────────────');
        lines.push('  합계 금액 : '+won(total)+'원');
        lines.push('─────────────────────────────');
        lines.push('');lines.push('[ 신청양식 ]');
        DATA.apply.forEach(function(q,i){
            var el=document.getElementById('aq_'+i); var v=el?el.value.trim():'';
            lines.push('▸ '+q.ko); lines.push('  '+(v||'(미입력)')); lines.push('');
        });
        lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
        lines.push('양식이 완성되면 복사해서 작가님께 전달해주세요 :)');
        return {text:lines.join('\n'), total:total, any:any};
    }
    function countSel(){
        var c=0;
        DATA.sections.forEach(function(sec){
            if(sec.type==='radio'&&sel[sec.id])c++;
            else if(sel[sec.id])c+=Object.keys(sel[sec.id]).length;
        });
        return c;
    }
    function mmPostMeta(total){
        try{
            if(window.self===window.top) return;
            var secs=[]; document.querySelectorAll('.section').forEach(function(s){var t=s.querySelector('.sec-title');var lab=t?t.textContent.trim():'';if(lab)secs.push({label:lab, y:s.getBoundingClientRect().top+(window.pageYOffset||document.documentElement.scrollTop||0)});});
            parent.postMessage({src:'ode-artmug', sections:secs, total:(total||0)}, '*');
        }catch(e){}
    }
    function rebuild(){
        var r=buildFormText();
        document.getElementById('totalAmt').textContent=won(r.total);
        var sm=document.getElementById('smTotal'); if(sm)sm.textContent=won(r.total)+' '+UI[lang].won;
        mmPostMeta(r.total);
        var c=countSel();
        document.getElementById('totalCnt').textContent=c?UI[lang].cnt(c):'';
        var body=document.getElementById('previewBody');
        if(!r.any){body.textContent=UI[lang].emptyPreview;body.style.color='var(--ink3)';}
        else{body.textContent=r.text;body.style.color='var(--ink)';}
    }
    function copyForm(){
        var r=buildFormText();
        if(!r.any){return;}
        navigator.clipboard.writeText(r.text).then(function(){}).catch(function(){
            var ta=document.createElement('textarea');ta.value=r.text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
        });
    }

    /* ════════ toast ════════ */
    var toastT;
    function toast(msg){
        var el=document.getElementById('toast');
        el.textContent=msg;
        el.classList.add('show');
        clearTimeout(toastT);
        toastT=setTimeout(function(){el.classList.remove('show');},2200);
    }

    /* ════════ init ════════ */
    /* 데이터는 data/commission.json 에서 불러옴 (스튜디오 편집탭에서 수정).
       불러오기 실패 시 위에 하드코딩된 DATA를 그대로 사용(fallback). */
    function applyData(j){
        if(!j)return;
        if(j.hero)DATA.hero=j.hero;
        if(j.steps&&j.steps.length)STEPS=j.steps;
        if(j.chips)DATA.chips=j.chips;
        if(j.slots)DATA.slots=j.slots;
        if(j.sections)DATA.sections=j.sections;
        if(j.notice)DATA.notice=j.notice;
        if(j.apply)DATA.apply=j.apply;
        if(j.portfolioOrder)DATA.portfolioOrder=j.portfolioOrder;
    }
    function init(){
        fetch('data/commission.json?t='+Date.now())
            .then(function(r){return r.ok?r.json():null;})
            .then(function(j){applyData(j);})
            .catch(function(){})
            .then(function(){ setLang('ko'); loadFile();});
    }
    init();
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLb();});

    /* ── iframe 자동 높이: 부모(artmug.kr)에 내 높이 전달 ── */
    (function(){
        var _lastH=0;
        /* 실제 콘텐츠 바닥 높이 — body min-height 스트레치/position:fixed·absolute 요소에 영향 안 받음 → 무한루프 차단 */
        function contentHeight(){
            var max=0, kids=document.body.children;
            for(var i=0;i<kids.length;i++){
                var el=kids[i], pos='';
                try{ pos=getComputedStyle(el).position; }catch(e){}
                if(pos==='fixed'||pos==='absolute') continue;
                var b=el.getBoundingClientRect().bottom + (window.pageYOffset||document.documentElement.scrollTop||0);
                if(b>max) max=b;
            }
            return Math.ceil(max)||document.body.scrollHeight;
        }
        function postH(){
            try{
                var h=contentHeight();
                if(Math.abs(h-_lastH)<4) return; _lastH=h;
                parent.postMessage({src:'ode-artmug', mmHeight:h}, '*');
            }catch(e){}
        }
        if(window.self!==window.top){ try{ document.body.style.minHeight='0'; document.documentElement.style.minHeight='0'; }catch(e){} } // 보조: 스트레치 제거
        function tick(){ postH(); try{ if(window.mmPostMeta){ var el=document.getElementById('totalAmt'); var t=el?parseInt((el.textContent||'0').replace(/[^\d]/g,''),10)||0:0; mmPostMeta(t); } }catch(e){} }
        window.addEventListener('load', tick);
        window.addEventListener('resize', tick);
        try{ new MutationObserver(postH).observe(document.body, {childList:true,subtree:true,attributes:true,characterData:true}); }catch(e){}
        setInterval(tick, 1000);
        tick();
    })();

    /* ── 떠있는 사이드바 (합계 + 섹션 이동) ── */
    (function(){
        var EMB = window.self!==window.top;
        function navTo(sec){
            if(!sec) return;
            if(!EMB){ try{ sec.scrollIntoView({behavior:'smooth',block:'start'}); }catch(e){ sec.scrollIntoView(); } }
            else { try{ var y=sec.getBoundingClientRect().top+(window.pageYOffset||document.documentElement.scrollTop||0); parent.postMessage({src:'ode-artmug', scrollToY:y}, '*'); }catch(e){} }
        }
        function buildSideNav(){
            var nav=document.getElementById('smNav'); if(!nav) return;
            var secs=document.querySelectorAll('.section'); var h='';
            secs.forEach(function(s,i){ var t=s.querySelector('.sec-title'); var lab=t?t.textContent.trim():''; if(lab) h+='<div class="sm-link" data-i="'+i+'">'+lab+'</div>'; });
            nav.innerHTML=h;
            nav.querySelectorAll('.sm-link').forEach(function(a){ a.addEventListener('click',function(){ navTo(secs[+a.dataset.i]); }); });
        }
        function initSide(){
            window.buildSideNav=buildSideNav;
            buildSideNav();
            var sm=document.getElementById('sideMini');
            if(typeof rebuild==='function') rebuild();              // 합계 동기화
            if(!EMB){ if(sm) sm.classList.add('show'); }            // 단독 페이지: 고정 표시
            else {                                                  // 임베드: 부모 스크롤 동기화 시 표시
                window.addEventListener('message', function(e){
                    var d=e.data; if(!d||d.src!=='ode-parent'||typeof d.vTop!=='number') return;
                    if(!sm) return; sm.style.position='absolute'; sm.style.top=(d.vTop+16)+'px'; sm.classList.add('show');
                });
            }
        }
        if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', initSide); else initSide();
    })();
</script>
<div id="sideMini">
    <div class="sm-tl">현재 합계</div>
    <div class="sm-amt" id="smTotal">0 원</div>
    <div class="sm-nav" id="smNav"></div>
</div>
